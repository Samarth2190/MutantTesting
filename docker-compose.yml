version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    command: npm run ci
    volumes:
      - .:/app
    working_dir: /app

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    command: npm start
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
