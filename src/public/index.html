<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mutation Testing Demo – Pricing Calculator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Pricing Calculator</h1>
        <p class="subtitle">
          Demo UI for your DevOps + mutation testing project (Node.js, Stryker, CI/CD).
        </p>
      </header>

      <section class="card">
        <form id="calc-form" class="grid" novalidate>
          <label class="field">
            <span>Price</span>
            <input name="price" type="number" min="0" step="0.01" value="100" required />
          </label>

          <label class="field">
            <span>Discount Rate (0–1)</span>
            <input name="discountRate" type="number" min="0" step="0.01" value="0.10" required />
          </label>

          <label class="field">
            <span>Tax Rate (0–1)</span>
            <input name="taxRate" type="number" min="0" step="0.01" value="0.07" required />
          </label>

          <div class="actions">
            <button type="submit" id="calc-btn">Calculate</button>
            <button type="button" id="reset-btn" class="secondary">Reset</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Result</h2>
        <div id="result" class="result muted">Submit the form to calculate.</div>
        <div id="error" class="error" hidden></div>
      </section>

      <footer class="footer">
        <code>POST /api/calculate</code>
        <span class="dot">•</span>
        <a href="/api/health" target="_blank" rel="noreferrer">Health</a>
      </footer>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
